<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Séparateur de texte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
            font-size: 2em;
        }

        .tabs { display: flex; gap: 5px; }

        .tab {
            padding: 12px 25px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 14px;
            color: #888;
            transition: all 0.3s;
            user-select: none;
        }

        .tab.active { background: #0f3460; color: #e94560; font-weight: bold; }
        .tab:hover { color: #e0e0e0; }

        .tab-content {
            display: none;
            background: #0f3460;
            border-radius: 0 10px 10px 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .tab-content.active { display: block; }

        .drop-zone {
            border: 3px dashed #e94560;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(233, 69, 96, 0.05);
        }

        .drop-zone:hover, .drop-zone.drag-over {
            background: rgba(233, 69, 96, 0.15);
            border-color: #ff6b81;
        }

        .drop-zone .icon { font-size: 48px; margin-bottom: 10px; }
        .drop-zone p { font-size: 16px; margin-bottom: 5px; }
        .drop-zone .sub { font-size: 12px; color: #888; }

        .hidden-input { display: none; }

        .file-list { margin-top: 15px; }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16213e;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .file-item .file-info { display: flex; align-items: center; gap: 10px; }
        .file-item .file-icon { font-size: 20px; }
        .file-item .file-size { color: #888; font-size: 12px; }

        .file-item .remove-file {
            background: #e94560;
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-item .remove-file:hover { background: #c73652; }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid #16213e;
            border-radius: 10px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }

        textarea:focus { border-color: #e94560; }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            font-size: 14px;
            color: #888;
        }

        .options {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .options label { font-size: 14px; }

        .options input[type="number"],
        .options select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #0f3460;
            background: #16213e;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }

        .options input[type="number"] { width: 100px; }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn:hover { background: #c73652; }
        .btn:active { transform: scale(0.97); }

        .btn-copy {
            padding: 6px 14px;
            font-size: 12px;
            background: #0f3460;
        }

        .btn-copy:hover { background: #1a4a8a; }

        .btn-dl {
            padding: 6px 14px;
            font-size: 12px;
            background: #27ae60;
        }

        .btn-dl:hover { background: #219a52; }

        .results { margin-top: 30px; }
        .file-results { margin-bottom: 40px; }

        .file-results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px 20px;
            background: #16213e;
            border-radius: 10px;
            border-left: 4px solid #e94560;
            flex-wrap: wrap;
            gap: 8px;
        }

        .file-results-header h3 { color: #e94560; }

        .part {
            background: #16213e;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #0f3460;
        }

        .part-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #0f3460;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 8px;
        }

        .part-header .char-count {
            font-weight: normal;
            font-size: 13px;
            color: #aaa;
        }

        .part-header .actions { display: flex; gap: 6px; align-items: center; }

        .part-content {
            padding: 15px 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .error-msg {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .success-msg {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid #27ae60;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }

        .copied-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 999;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            font-size: 16px;
            color: #e94560;
        }

        .loading.active { display: block; }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e94560;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .options { flex-direction: column; align-items: flex-start; }
            .part-header { flex-direction: column; align-items: flex-start; }
            .file-results-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✂️ Séparateur de texte</h1>

    <!-- Options -->
    <div class="options">
        <label for="max_chars">Limite par partie :</label>
        <input type="number" id="max_chars" value="10000" min="100" max="100000">
        <label>caractères</label>

        <label for="split_mode" style="margin-left: 15px;">Découpe :</label>
        <select id="split_mode">
            <option value="smart">Intelligente</option>
            <option value="hard">Brute</option>
        </select>
    </div>

    <!-- Onglets -->
    <div class="tabs">
        <div class="tab active" data-tab="tab-text">📝 Texte</div>
        <div class="tab" data-tab="tab-files">📁 Fichiers</div>
    </div>

    <!-- Onglet Texte -->
    <div class="tab-content active" id="tab-text">
        <textarea id="textInput" placeholder="Collez votre texte ici..."></textarea>
        <div class="info-bar">
            <span id="charCount">0 caractères</span>
        </div>
    </div>

    <!-- Onglet Fichiers -->
    <div class="tab-content" id="tab-files">
        <div class="drop-zone" id="dropZone">
            <div class="icon">📂</div>
            <p>Glissez-déposez vos fichiers ici</p>
            <p>ou <strong style="color: #e94560;">cliquez pour parcourir</strong></p>
            <p class="sub">Formats : TXT, CSV, HTML, XML, JSON, MD, LOG, CSS, JS, PHP, PY, SQL, etc.</p>
        </div>
        <input type="file" id="fileInput" multiple class="hidden-input"
               accept=".txt,.csv,.html,.htm,.xml,.json,.md,.log,.css,.js,.php,.py,.java,.c,.cpp,.h,.sql,.yml,.yaml,.ini,.cfg,.conf,.rtf,.srt,.sub,.vtt,.tex,.sh,.bat,.rb,.go,.rs,.ts,.jsx,.tsx,.vue,.svelte">
        <div class="file-list" id="fileList"></div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <button class="btn" id="submitBtn" onclick="processAll()">✂️ Découper le texte</button>
    </div>

    <div class="loading" id="loading">
        <span class="spinner"></span> Traitement en cours...
    </div>

    <!-- Résultats -->
    <div id="resultsContainer"></div>
</div>

<div class="copied-toast" id="toast"></div>

<script>
    // ============================================================
    // ONGLETS
    // ============================================================
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab).classList.add('active');
        });
    });

    // ============================================================
    // COMPTEUR TEXTAREA
    // ============================================================
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');

    textInput.addEventListener('input', () => {
        charCount.textContent = textInput.value.length.toLocaleString('fr-FR') + ' caractères';
    });

    // ============================================================
    // GESTION FICHIERS
    // ============================================================
    let selectedFiles = [];
    const fileInput = document.getElementById('fileInput');
    const fileListEl = document.getElementById('fileList');
    const dropZone = document.getElementById('dropZone');

    dropZone.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover'].forEach(evt => {
        dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    });
    ['dragleave', 'drop'].forEach(evt => {
        dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
    });

    dropZone.addEventListener('drop', e => addFiles(e.dataTransfer.files));
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

    function addFiles(fileListObj) {
        for (const f of fileListObj) {
            if (!selectedFiles.some(sf => sf.name === f.name && sf.size === f.size)) {
                selectedFiles.push(f);
            }
        }
        renderFileList();
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        renderFileList();
    }

    function renderFileList() {
        fileListEl.innerHTML = '';
        selectedFiles.forEach((f, i) => {
            const ext = f.name.split('.').pop().toUpperCase();
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <div class="file-info">
                    <span class="file-icon">📄</span>
                    <div>
                        <div>${escapeHtml(f.name)}</div>
                        <div class="file-size">${ext} · ${formatSize(f.size)}</div>
                    </div>
                </div>
                <button type="button" class="remove-file" onclick="removeFile(${i})">✕</button>
            `;
            fileListEl.appendChild(div);
        });
    }

    // ============================================================
    // DÉCOUPE
    // ============================================================
    function splitText(text, maxChars, mode) {
        const parts = [];
        if (!text || text.length === 0) return parts;

        if (mode === 'hard') {
            for (let i = 0; i < text.length; i += maxChars) {
                parts.push(text.substring(i, i + maxChars));
            }
        } else {
            let remaining = text;
            while (remaining.length > 0) {
                if (remaining.length <= maxChars) {
                    parts.push(remaining);
                    break;
                }

                const chunk = remaining.substring(0, maxChars);
                let cutPos = -1;

                // Paragraphe
                const lastPara = chunk.lastIndexOf('\n\n');
                if (lastPara !== -1 && lastPara > maxChars * 0.3) {
                    cutPos = lastPara + 2;
                }

                // Ligne
                if (cutPos === -1) {
                    const lastLine = chunk.lastIndexOf('\n');
                    if (lastLine !== -1 && lastLine > maxChars * 0.3) {
                        cutPos = lastLine + 1;
                    }
                }

                // Phrase
                if (cutPos === -1) {
                    for (let i = chunk.length - 1; i > maxChars * 0.3; i--) {
                        if (['.', '!', '?'].includes(chunk[i])) {
                            cutPos = i + 1;
                            break;
                        }
                    }
                }

                // Espace
                if (cutPos === -1) {
                    const lastSpace = chunk.lastIndexOf(' ');
                    if (lastSpace !== -1 && lastSpace > maxChars * 0.2) {
                        cutPos = lastSpace + 1;
                    }
                }

                // Brut
                if (cutPos === -1) {
                    cutPos = maxChars;
                }

                parts.push(remaining.substring(0, cutPos));
                remaining = remaining.substring(cutPos);
            }
        }

        return parts;
    }

    // ============================================================
    // LECTURE FICHIER → TEXTE
    // ============================================================
    function readFileAsText(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(new Error("Impossible de lire " + file.name));
            reader.readAsText(file, 'UTF-8');
        });
    }

    // ============================================================
    // TRAITEMENT PRINCIPAL
    // ============================================================
    async function processAll() {
        const maxChars = Math.max(100, Math.min(100000, parseInt(document.getElementById('max_chars').value) || 10000));
        const mode = document.getElementById('split_mode').value;
        const container = document.getElementById('resultsContainer');
        const loading = document.getElementById('loading');
        const submitBtn = document.getElementById('submitBtn');

        container.innerHTML = '';
        loading.classList.add('active');
        submitBtn.disabled = true;

        // Petite pause pour laisser le DOM afficher le loading
        await new Promise(r => setTimeout(r, 50));

        const allResults = [];
        const errors = [];

        // Texte collé
        const pastedText = textInput.value;
        if (pastedText.trim().length > 0) {
            const parts = splitText(pastedText, maxChars, mode);
            if (parts.length > 0) {
                allResults.push({ source: 'Texte collé', totalChars: pastedText.length, parts });
            }
        }

        // Fichiers
        for (const file of selectedFiles) {
            try {
                const text = await readFileAsText(file);
                if (!text || text.trim().length === 0) {
                    errors.push(`⚠️ ${file.name} : Fichier vide.`);
                    continue;
                }
                const parts = splitText(text, maxChars, mode);
                if (parts.length > 0) {
                    allResults.push({ source: file.name, totalChars: text.length, parts });
                }
            } catch (err) {
                errors.push(`❌ ${file.name} : ${err.message}`);
            }
        }

        loading.classList.remove('active');
        submitBtn.disabled = false;

        // Affichage erreurs
        errors.forEach(err => {
            container.innerHTML += `<div class="error-msg">${escapeHtml(err)}</div>`;
        });

        if (allResults.length === 0 && errors.length === 0) {
            container.innerHTML = `<div class="error-msg">Aucun texte à découper. Collez du texte ou envoyez des fichiers.</div>`;
            return;
        }

        if (allResults.length === 0) return;

        // Résumé
        let totalParts = 0;
        allResults.forEach(r => totalParts += r.parts.length);

        let html = `<div class="results">`;
        html += `<div class="success-msg">
            ✅ ${allResults.length} source${allResults.length > 1 ? 's' : ''} traitée${allResults.length > 1 ? 's' : ''}
            → <strong>${totalParts} partie${totalParts > 1 ? 's' : ''}</strong> générée${totalParts > 1 ? 's' : ''}
        </div>`;

        allResults.forEach((result, ri) => {
            const baseName = result.source.replace(/\.[^.]+$/, '') || 'texte';
            html += `<div class="file-results">`;
            html += `<div class="file-results-header">
                <h3>📄 ${escapeHtml(result.source)}</h3>
                <span style="font-size:13px;color:#aaa;">
                    ${result.totalChars.toLocaleString('fr-FR')} car. → ${result.parts.length} partie${result.parts.length > 1 ? 's' : ''}
                </span>
            </div>`;

            result.parts.forEach((part, pi) => {
                const partId = `part-${ri}-${pi}`;
                const dlName = `${baseName}_part${pi + 1}.txt`;
                html += `<div class="part">
                    <div class="part-header">
                        <span>📄 Partie ${pi + 1} / ${result.parts.length}</span>
                        <div class="actions">
                            <span class="char-count">${part.length.toLocaleString('fr-FR')} car.</span>
                            <button type="button" class="btn btn-copy" onclick="copyPart('${partId}')">📋 Copier</button>
                            <button type="button" class="btn btn-dl" onclick="downloadPart('${partId}', '${escapeAttr(dlName)}')">💾 .txt</button>
                        </div>
                    </div>
                    <div class="part-content" id="${partId}">${escapeHtml(part)}</div>
                </div>`;
            });

            html += `</div>`;
        });

        html += `</div>`;
        container.innerHTML = html;
    }

    // ============================================================
    // UTILITAIRES
    // ============================================================
    function copyPart(id) {
        const content = document.getElementById(id).innerText;
        navigator.clipboard.writeText(content).then(() => {
            showToast('✅ Copié !');
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = content;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('✅ Copié !');
        });
    }

    function downloadPart(id, filename) {
        const content = document.getElementById(id).innerText;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('💾 Téléchargé !');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' o';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' Ko';
        return (bytes / (1024 * 1024)).toFixed(1) + ' Mo';
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function escapeAttr(str) {
        return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
</script>

</body>
</html>
